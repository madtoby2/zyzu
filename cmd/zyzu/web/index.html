<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资源组 ZYZU - TG频道控制台</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>📡 资源组 ZYZU</h1>
    <span>TG频道资源站采集控制台</span>
  </header>

  <div class="stats" id="stats">
    <div class="stat-card"><div class="num" id="stat-total">-</div><div>总站点</div></div>
    <div class="stat-card"><div class="num" id="stat-blocked">-</div><div>已屏蔽</div></div>
    <div class="stat-card"><div class="num" id="stat-posted">-</div><div>已推送</div></div>
    <div class="stat-card"><div class="num" id="stat-sched">-</div><div>调度状态</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="搜索站名/API..." oninput="renderStations()">
    <label class="cb"><input type="checkbox" id="show-blocked" onchange="renderStations()">显示已屏蔽</label>
    <button class="btn btn-primary" onclick="triggerScrape()">🔄 立即采集</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('stations')">资源站</button>
    <button class="tab" onclick="switchTab('history')">推送记录</button>
    <button class="tab" onclick="switchTab('config')">配置</button>
  </div>

  <div id="tab-stations" class="tab-content">
    <table>
      <thead>
        <tr>
          <th>名称</th><th>类型</th><th>资源量</th><th>可用率</th><th>响应</th><th>标签</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="station-list"></tbody>
    </table>
  </div>

  <div id="tab-history" class="tab-content hidden">
    <table>
      <thead><tr><th>时间</th><th>站点</th><th>动作</th><th>MSG ID</th></tr></thead>
      <tbody id="history-list"></tbody>
    </table>
  </div>

  <div id="tab-config" class="tab-content hidden">
    <div class="config-form">
      <label>Bot Token <input type="text" id="cfg-token" placeholder="123:abc..."></label>
      <label>Channel ID <input type="number" id="cfg-channel" placeholder="-100xxx"></label>
      <label>Cron表达式 <input type="text" id="cfg-cron" placeholder="0 */6 * * *"></label>
      <label>推送格式<br>
        <textarea id="cfg-format" rows="4"></textarea>
      </label>
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
    <div class="help">
      <h3>格式变量</h3>
      <code>{name} {category} {api_url} {availability} {resource_count} {response_time} {interface_type} {tags} {description}</code>
      <h3>Cron</h3>
      <code>0 */6 * * *</code> = 每6小时 &nbsp; <code>0 8,20 * * *</code> = 早8晚8
    </div>
  </div>

  <div id="toast"></div>
</div>
<script src="/app.js"></script>
</body>
</html>
